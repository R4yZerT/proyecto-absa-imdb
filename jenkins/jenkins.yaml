# =============================================================================
# jenkins/jenkins.yaml — Configuración JCasC para Jenkins
# =============================================================================
# Cargado automáticamente por el plugin configuration-as-code.
# =============================================================================

jenkins:
  systemMessage: "ABSA Movie Insights - CI/CD Pipeline\n"
  numExecutors: 2
  quietPeriod: 5

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "${JENKINS_URL:-http://localhost:8080}"
    adminAddress: "${JENKINS_ADMIN_EMAIL:-admin@example.com}"

  gitSCM:
    createAccountBasedOnEmail: false
    globalConfigName: "Jenkins"
    globalConfigEmail: "${JENKINS_ADMIN_EMAIL:-jenkins@example.com}"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: docker-hub-token
              description: "Docker Hub Token"
              secret: "${DOCKER_HUB_TOKEN:-}"
          - usernamePassword:
              scope: GLOBAL
              id: github-credentials
              description: "GitHub Credentials"
              username: "${GITHUB_USER:-}"
              password: "${GITHUB_TOKEN:-}"
          - string:
              scope: GLOBAL
              id: github-token
              description: "GitHub Personal Access Token"
              secret: "${GITHUB_TOKEN:-}"
