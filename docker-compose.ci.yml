# =============================================================================
# docker-compose.ci.yml — Override para CI/CD (puertos alternativos)
# =============================================================================
# Este archivo se combina con docker-compose.yml en pipelines Jenkins:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
# Evita colisiones de puerto con servicios ya corriendo en el host del runner.
# =============================================================================

services:
  backend:
    ports:
      - "8001:8000"

  frontend:
    ports:
      - "5174:5173"
