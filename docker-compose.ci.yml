# =============================================================================
# docker-compose.ci.yml — Override para CI/CD (sin host port binding)
# =============================================================================
# Evita colisiones de puerto con servicios ya corriendo en el host del runner.
# Elimina completamente el mapeo de puertos del host; los servicios solo se
# comunican a través de la red interna Docker (absa-network).
# Smoke tests se ejecutan vía docker compose exec dentro del propio contenedor.
# =============================================================================

services:
  backend:
    ports: null

  frontend:
    ports: null
